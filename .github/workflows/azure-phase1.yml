name: closedloop-phase1

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest

  validate-bicep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        if: ${{ secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate Bicep
        if: ${{ secrets.AZURE_SUBSCRIPTION_ID != '' }}
        uses: azure/cli@v2
        with:
          inlineScript: |
            az bicep install
            az deployment sub validate \
              --location "${{ vars.AZURE_LOCATION || 'eastus' }}" \
              --template-file infra/main.bicep

  deploy-infra:
    if: github.event_name == 'workflow_dispatch'
    needs: [test]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy infrastructure
        uses: azure/cli@v2
        with:
          inlineScript: |
            az bicep install
            az deployment sub create \
              --location "${{ vars.AZURE_LOCATION || 'eastus' }}" \
              --template-file infra/main.bicep
